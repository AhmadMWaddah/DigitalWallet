{# --#-- Error State #}
{# Shows error message with retry option #}

<div class="statement-error">
    <div class="error-icon">
        <i class="fas fa-exclamation-circle"></i>
    </div>

    <div class="error-message">
        <h4>Generation Failed</h4>
        <p>{{ error|default:"An unexpected error occurred while generating your statement." }}</p>
    </div>

    <div class="retry-actions">
        <button class="btn btn-retry"
                hx-get="{% url 'wallet:statement_form_partial' %}"
                hx-target="#statement-section"
                hx-swap="innerHTML">
            <i class="fas fa-redo"></i>
            Try Again
        </button>
    </div>

    <style>
        .statement-error {
            padding: var(--spacing-lg);
            background: rgba(199, 93, 93, 0.15);
            border-radius: var(--radius-lg);
            text-align: center;
            border: 1px solid var(--color-danger);
        }

        .error-icon {
            font-size: 2.5rem;
            color: var(--color-danger);
            margin-bottom: var(--spacing-sm);
        }

        .error-message h4 {
            color: var(--text-primary);
            margin: 0 0 var(--spacing-xs) 0;
            font-size: var(--text-lg);
            font-weight: var(--font-semibold);
        }

        .error-message p {
            color: var(--text-secondary);
            margin: 0 0 var(--spacing-md) 0;
            font-size: var(--text-sm);
        }

        .retry-actions {
            margin-top: var(--spacing-md);
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color-light);
            border-radius: var(--radius-md);
            font-weight: var(--font-medium);
            font-size: var(--text-sm);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-retry:hover {
            background: var(--bg-card);
            border-color: var(--color-danger);
            color: var(--color-danger);
        }

        .btn-retry i {
            font-size: var(--text-sm);
        }
    </style>
</div>

{# --#-- Statement Request Form (Initial State) #}
{# Form submits to start PDF generation #}

<form class="statement-request-form"
      hx-post="{% url 'wallet:statement_request' %}"
      hx-target="#statement-section"
      hx-swap="innerHTML"
      hx-indicator=".htmx-indicator">

    {% csrf_token %}

    <div class="form-row">
        <div class="form-group">
            <label for="statement-start-date">
                <i class="fas fa-calendar-alt"></i>
                Start Date
            </label>
            <input type="date"
                   id="statement-start-date"
                   name="start_date"
                   required
                   max="{% now 'Y-m-d' %}"
                   class="form-input">
        </div>

        <div class="form-group">
            <label for="statement-end-date">
                <i class="fas fa-calendar-alt"></i>
                End Date
            </label>
            <input type="date"
                   id="statement-end-date"
                   name="end_date"
                   required
                   max="{% now 'Y-m-d' %}"
                   class="form-input">
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-statement">
            <i class="fas fa-file-pdf"></i>
            Generate Statement
        </button>
        <span class="htmx-indicator" style="display: none; margin-left: var(--spacing-md);">
            <i class="fas fa-circle-notch fa-spin"></i> Generating...
        </span>
    </div>
</form>

<style>
    .statement-request-form {
        background: var(--bg-card);
        padding: 1.5rem;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-color);
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--spacing-md);
    }

    .form-group {
        margin-bottom: 0;
    }

    .form-group label {
        display: block;
        margin-bottom: var(--spacing-sm);
        color: var(--text-primary);
        font-weight: var(--font-medium);
        font-size: var(--text-sm);
    }

    .form-group label i {
        margin-right: var(--spacing-xs);
        color: var(--color-primary-light);
    }

    .form-control {
        width: 100%;
        padding: var(--spacing-sm) var(--spacing-md);
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color-light);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-size: var(--text-sm);
        transition: all 0.2s ease;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px var(--color-primary-bg);
    }

    .form-control::-webkit-calendar-picker-indicator {
        filter: invert(1);
        cursor: pointer;
    }

    .form-actions {
        margin-top: var(--spacing-lg);
    }

    .btn-statement {
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--spacing-sm);
        padding: var(--spacing-md) var(--spacing-lg);
        background: linear-gradient(135deg, var(--copperwood) 0%, var(--toasted-almond) 100%);
        color: var(--cornsilk);
        border: none;
        border-radius: var(--radius-md);
        font-weight: var(--font-medium);
        font-size: var(--text-sm);
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(188, 108, 37, 0.3);
    }

    .btn-statement:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(188, 108, 37, 0.4);
        background: linear-gradient(135deg, var(--toasted-almond) 0%, var(--sunlit-clay) 100%);
    }

    .btn-statement:active {
        transform: translateY(0);
    }

    .btn-statement i {
        font-size: var(--text-base);
    }

    /* Loading state */
    .btn-statement.htmx-request {
        opacity: 0.7;
        cursor: not-allowed;
        pointer-events: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }
    }
</style>

<script>
    // Auto-set default date range (last 30 days)
    document.addEventListener('DOMContentLoaded', function() {
        const startDateInput = document.getElementById('start_date');
        const endDateInput = document.getElementById('end_date');

        if (startDateInput && endDateInput && !startDateInput.value) {
            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(today.getDate() - 30);

            endDateInput.value = today.toISOString().split('T')[0];
            startDateInput.value = thirtyDaysAgo.toISOString().split('T')[0];
        }
    });
</script>

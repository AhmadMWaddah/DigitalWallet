{# --#-- Statement Progress Bar (HTMX Polling) #}
{# Displayed while PDF generation is in progress - Earth-Tone Design #}

<div id="statement-progress-container"
     hx-get="{% url 'wallet:statement_status' task_id %}"
     hx-trigger="every 2s"
     hx-swap="outerHTML">

    <div class="statement-progress">
        <div class="progress-header">
            <i class="fas fa-circle-notch fa-spin"></i>
            <span>Generating your statement...</span>
        </div>

        <div class="progress-bar-container">
            <div class="progress-bar" style="width: {{ progress|default:0 }}%;"></div>
        </div>

        <div class="progress-status">
            <small>Please wait while we prepare your statement...</small>
        </div>
    </div>

    <style>
        .statement-progress {
            padding: var(--spacing-lg);
            background: var(--bg-tertiary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color-light);
        }

        .progress-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            color: var(--text-primary);
            font-weight: var(--font-medium);
            font-size: var(--text-sm);
        }

        .progress-header i {
            color: var(--color-primary);
            font-size: var(--text-lg);
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: var(--radius-full);
            overflow: hidden;
            margin-bottom: var(--spacing-sm);
            border: 1px solid var(--border-color);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--copperwood) 0%, var(--toasted-almond) 50%, var(--sunlit-clay) 100%);
            transition: width 0.5s ease;
            border-radius: var(--radius-full);
            box-shadow: 0 0 10px rgba(188, 108, 37, 0.5);
        }

        .progress-status small {
            color: var(--text-secondary);
            font-size: var(--text-xs);
            display: block;
            text-align: center;
        }

        /* Pulse animation for loading */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .progress-status {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</div>

{# Stop polling after receiving this response #}
<script>
    // HTMX will stop polling when it receives a response without hx-get
    // The download button template doesn't have hx-trigger, so polling stops
</script>

{# --#-- Statement Download Button (HTMX Success State) #}
{# Displayed when PDF generation is complete - Earth-Tone Design #}

<div id="statement-download-container" class="statement-success">
    <div class="success-icon">
        <i class="fas fa-check-circle"></i>
    </div>

    <div class="success-message">
        <h4>Statement Ready!</h4>
        <p>Your account statement has been generated successfully.</p>
    </div>

    <a href="{{ download_url }}"
       class="btn btn-download"
       target="_blank">
        <i class="fas fa-file-pdf"></i>
        Download Statement (PDF)
    </a>

    <style>
        .statement-success {
            padding: var(--spacing-lg);
            background: rgba(96, 108, 56, 0.15);
            border-radius: var(--radius-lg);
            text-align: center;
            border: 1px solid var(--color-success);
        }

        .success-icon {
            font-size: 2.5rem;
            color: var(--color-success);
            margin-bottom: var(--spacing-sm);
            animation: successPop 0.5s ease-out;
        }

        @keyframes successPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .success-message h4 {
            color: var(--text-primary);
            margin: 0 0 var(--spacing-xs) 0;
            font-size: var(--text-lg);
            font-weight: var(--font-semibold);
        }

        .success-message p {
            color: var(--text-secondary);
            margin: 0 0 var(--spacing-md) 0;
            font-size: var(--text-sm);
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-lg);
            background: linear-gradient(135deg, var(--olive-leaf) 0%, var(--black-forest) 100%);
            color: var(--cornsilk);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: var(--font-medium);
            font-size: var(--text-sm);
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(96, 108, 56, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(96, 108, 56, 0.4);
            background: linear-gradient(135deg, var(--black-forest) 0%, var(--olive-leaf) 100%);
        }

        .btn-download i {
            font-size: var(--text-base);
        }
    </style>
</div>

<!-- --#-- Analytics Charts Partial (HTMX Response) -->
{% load static %}

{# Store chart data as JSON for JavaScript consumption #}
<div id="chart-data" style="display: none;">{{ chart_data_json|safe }}</div>

<!-- --#-- Summary Stats -->
<div class="stats-row">
    <div class="stat-box">
        <span class="stat-label">Total Volume</span>
        <span class="stat-value" id="total-volume">${{ metadata.total_volume|floatformat:2 }}</span>
    </div>
    <div class="stat-box">
        <span class="stat-label">Avg Monthly</span>
        <span class="stat-value" id="avg-monthly">${{ metadata.average_monthly|floatformat:2 }}</span>
    </div>
    <div class="stat-box">
        <span class="stat-label">Period</span>
        <span class="stat-value">{{ metadata.period_label }}</span>
    </div>
</div>

<!-- --#-- Charts Grid -->
<div class="charts-grid">
    <!-- Spending by Category (Bar Chart) -->
    <div class="chart-card">
        <div class="chart-header">
            <h3 class="chart-title">
                <i class="fas fa-chart-bar"></i> Spending by Category
            </h3>
        </div>
        <div class="chart-body">
            <canvas id="category-chart"></canvas>
        </div>
    </div>

    <!-- Monthly Trends (Line Chart) -->
    <div class="chart-card">
        <div class="chart-header">
            <h3 class="chart-title">
                <i class="fas fa-chart-line"></i> Monthly Trends
            </h3>
        </div>
        <div class="chart-body">
            <canvas id="monthly-chart"></canvas>
        </div>
    </div>
</div>

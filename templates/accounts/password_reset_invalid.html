<!-- --#-- Password Reset Invalid Template -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Link - Digital Wallet</title>
    <link rel="stylesheet" href="{% static 'css/base_variables.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--black-forest) 0%, #1a2410 50%, var(--olive-leaf) 100%);
            padding: var(--spacing-lg);
        }
        .invalid-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-3xl);
            padding: var(--spacing-2xl);
            border: 1px solid var(--glass-border);
            text-align: center;
            max-width: 440px;
        }
        .invalid-icon { font-size: 4rem; margin-bottom: var(--spacing-lg); }
        .invalid-title { color: var(--cornsilk); margin-bottom: var(--spacing-md); }
        .invalid-text { color: var(--text-secondary); margin-bottom: var(--spacing-xl); }
        .invalid-link { color: var(--sunlit-clay); }
    </style>
</head>
<body>
    <div class="invalid-card">
        <div class="invalid-icon">⚠️</div>
        <h1 class="invalid-title">Invalid or Expired Link</h1>
        <p class="invalid-text">
            This password reset link is invalid or has expired. Please request a new one.
        </p>
        <p><a href="{% url 'accounts:password_reset_client' %}" class="invalid-link">Request New Link</a></p>
    </div>
</body>
</html>

<!-- --#-- Password Reset Done Template -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Link Sent - Digital Wallet</title>
    <link rel="stylesheet" href="{% static 'css/base_variables.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--black-forest) 0%, #1a2410 50%, var(--olive-leaf) 100%);
            padding: var(--spacing-lg);
        }
        .done-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-3xl);
            padding: var(--spacing-2xl);
            border: 1px solid var(--glass-border);
            text-align: center;
            max-width: 440px;
        }
        .done-icon { font-size: 4rem; margin-bottom: var(--spacing-lg); }
        .done-title { color: var(--cornsilk); margin-bottom: var(--spacing-md); }
        .done-text { color: var(--text-secondary); margin-bottom: var(--spacing-xl); }
        .done-link { color: var(--sunlit-clay); }
    </style>
</head>
<body>
    <div class="done-card">
        <div class="done-icon">✉️</div>
        <h1 class="done-title">Reset Link Sent</h1>
        <p class="done-text">
            If an account exists with {{ email }}, you will receive a password reset link shortly.
        </p>
        <p><a href="{% url 'accounts:login' %}" class="done-link">Back to Login</a></p>
    </div>
</body>
</html>

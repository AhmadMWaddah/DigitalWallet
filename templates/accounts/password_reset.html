<!-- --#-- Password Reset Request Template -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Digital Wallet</title>

    <link rel="icon" type="image/png" href="{% static 'images/Digital_Wallet_Fav_Icon.png' %}">

    <link rel="stylesheet" href="{% static 'css/base_variables.css' %}">
    <link rel="stylesheet" href="{% static 'css/layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/forms.css' %}">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--black-forest) 0%, #1a2410 50%, var(--olive-leaf) 100%);
        }

        .reset-wrapper {
            width: 100%;
            max-width: 440px;
            padding: var(--spacing-lg);
        }

        .reset-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-3xl);
            padding: var(--spacing-2xl);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-2xl), var(--shadow-glow);
        }

        .reset-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .reset-logo {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
        }

        .reset-title {
            font-size: var(--text-2xl);
            font-weight: var(--font-bold);
            color: var(--cornsilk);
            margin-bottom: var(--spacing-sm);
        }

        .reset-subtitle {
            color: var(--text-secondary);
            font-size: var(--text-sm);
            margin: 0;
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: var(--font-medium);
            color: var(--cornsilk);
            font-size: var(--text-sm);
        }

        .form-input {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: var(--text-base);
            border: 1px solid var(--border-color-light);
            border-radius: var(--radius-lg);
            background: rgba(254, 250, 224, 0.05);
            color: var(--cornsilk);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-bg);
            background: rgba(254, 250, 224, 0.1);
        }

        .btn-reset {
            width: 100%;
            padding: var(--spacing-md);
            background: linear-gradient(135deg, var(--copperwood), var(--toasted-almond));
            color: var(--cornsilk);
            border: none;
            border-radius: var(--radius-lg);
            font-weight: var(--font-semibold);
            cursor: pointer;
            margin-top: var(--spacing-xl);
        }

        .reset-footer {
            margin-top: var(--spacing-xl);
            text-align: center;
        }

        .reset-footer a {
            color: var(--sunlit-clay);
        }
    </style>
</head>
<body>
    <div class="reset-wrapper">
        <div class="reset-card">
            <div class="reset-header">
                <div class="reset-logo">🔐</div>
                <h1 class="reset-title">Reset Password</h1>
                <p class="reset-subtitle">Enter your email to receive reset instructions</p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label for="id_email" class="form-label">Email Address</label>
                    {{ form.email }}
                    {% if form.email.errors %}
                    <div class="form-error">{{ form.email.errors.0 }}</div>
                    {% endif %}
                </div>

                <button type="submit" class="btn-reset">
                    Send Reset Link →
                </button>
            </form>

            <div class="reset-footer">
                <p><a href="{% url 'accounts:login' %}">← Back to Login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
